# HTTP → HTTPS リダイレクト（Let's Encrypt の認証も通す）
server {
  listen 80;
  server_name teracode6.zenpoji.or.jp;

  # Let's Encrypt 認証用
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;
  http2 on;
  server_name teracode6.zenpoji.or.jp;

  # Let's Encrypt 証明書
  ssl_certificate     /etc/letsencrypt/live/teracode6.zenpoji.or.jp/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/teracode6.zenpoji.or.jp/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Next の静的アセットはディスクから直接配信（docker-compose で .next/static をマウント）
  # マウント先にファイルが無い（ビルド直後に nginx 未再起動・別ディレクトリの compose 等）は 404 になるため、
  # その場合は Node にフォールバックする
  location /_next/static/ {
    alias /var/www/next-next-static/;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    error_page 404 = @next_static_proxy;
  }

  location @next_static_proxy {
    internal;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    # nginx(host network) からホストの Next.js(3000番)へ転送
    proxy_pass http://127.0.0.1:3000;

    # Next.js / WebSocket 向け
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
